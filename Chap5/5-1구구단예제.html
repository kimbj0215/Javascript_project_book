<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>책 예제 연습</title>
</head>
<body>
    <script>
        var num= prompt('구구단 몇 단을 볼까요?', '1~9의 숫자 입력');

if(num == ''|| isNaN(num)){
    alert('올바른 값을 입력하세요.');
} else if(num < 1 || num >10){
    alert('1부터 9까지 입력할 수 있습니다');
} else {
    for(var i = 1; i<10; i++){
        document.write(num + '*' + i + ' = ' + num * i + '<br>');
    }
}
    </script>
</body>
</html>
